services:
  db:
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: relihub
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: relihub
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://postgres:postgres@db:5432/relihub
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: production
      PROJECT_NAME: ReliHub
      API_V1_STR: /api/v1
      SECRET_KEY: super-secret-key-change-me-in-production
      PHONE_BLIND_INDEX_KEY: independent-blind-index-key-change-me
      BACKEND_CORS_ORIGINS: '["http://localhost:5179","http://localhost:80","http://localhost","http://localhost:3000"]'
      COS_SECRET_ID: your_cos_secret_id
      COS_SECRET_KEY: your_cos_secret_key
      COS_REGION: ap-shanghai
      COS_BUCKET: relihub-resources
      COS_ENDPOINT: https://cos.ap-shanghai.myqcloud.com
      SMS_TEST_CODE: "888888"
      WECHAT_MOCK_MODE: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: relihub
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://postgres:postgres@db:5432/relihub
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: production
      PROJECT_NAME: ReliHub
      API_V1_STR: /api/v1
      SECRET_KEY: super-secret-key-change-me-in-production
      PHONE_BLIND_INDEX_KEY: independent-blind-index-key-change-me
      BACKEND_CORS_ORIGINS: '["http://localhost:5179","http://localhost:80","http://localhost","http://localhost:3000"]'
      COS_SECRET_ID: your_cos_secret_id
      COS_SECRET_KEY: your_cos_secret_key
      COS_REGION: ap-shanghai
      COS_BUCKET: relihub-resources
      COS_ENDPOINT: https://cos.ap-shanghai.myqcloud.com
      SMS_TEST_CODE: "888888"
      WECHAT_MOCK_MODE: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: >
      bash -c "
        echo 'Initializing database extensions...' &&
        PYTHONPATH=/app python3 scripts/init_extensions.py &&
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Creating seed data...' &&
        PYTHONPATH=/app python3 scripts/create_seed_data.py &&
        echo 'Initialization complete!'
      "

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "5179:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
